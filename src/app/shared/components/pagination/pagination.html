<div class="flex items-center justify-between border-t border-slate-200 px-6 py-4 dark:border-slate-800">
  <p class="text-sm text-slate-500 dark:text-slate-400">
    Showing 
    <span class="font-medium text-slate-900 dark:text-white">{{startItem}}-{{endItem}}</span> 
    of 
    <span class="font-medium text-slate-900 dark:text-white">{{totalItems}}</span>
    | Page <span class="font-medium text-slate-900 dark:text-white">{{currentPage}}</span>
  </p>

  <div class="flex items-center gap-2">
    <button
      class="flex items-center justify-center rounded-lg border border-slate-200 bg-white p-2 text-slate-500 hover:bg-slate-50 disabled:opacity-50 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-400 dark:hover:bg-slate-700"
      [disabled]="currentPage === 1"
      (click)="goToPage(currentPage - 1)">
      <span class="material-symbols-outlined text-[20px]">chevron_left</span>
    </button>

    <button
      class="flex items-center justify-center rounded-lg border border-slate-200 bg-white p-2 text-slate-500 hover:bg-slate-50 disabled:opacity-50 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-400 dark:hover:bg-slate-700"
      [disabled]="currentPage === TotalPages"
      (click)="goToPage(currentPage + 1)">
      <span class="material-symbols-outlined text-[20px]">chevron_right</span>
    </button>

    <select
      class="ml-4 rounded-lg border border-slate-200 bg-white px-2 py-1 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300"
      [value]="pageSize"
      (change)="onPageSizeChange($event)">
      <option *ngFor="let size of pageSizes" [value]="size">{{size}} per page</option>
    </select>
  </div>
</div>
